# Methods vocabulary — v1
# Calibrated to the 53-project Phase 0 corpus. Entries cover computational and
# experimental methods actually deployed across the sampled projects.
#
# Categories:
#   fitness_profiling | genomics_comparative | metabolic_modeling | community_ecology |
#   literature_mining | phenotype_database | phylogenetics | statistical | ml_method
#
# Out of scope: individual statistical tests below a useful granularity (e.g., t-test),
# every permutation of BLAST parameters, etc.

