# Functions vocabulary — v1
# Seed covers pathway / biological-process / regulatory-category canonicals
# relevant to the BERIL corpus (microbial genomics, fitness, AMR, metabolism).
#
# This vocab targets "what biological function is being investigated?" — NOT
# the methods used to study it (that's methods/), NOT the organisms involved
# (that's organisms/). Functions are the subject of investigation in the
# abstract sense: what process, pathway, or regulatory system the science is
# illuminating.
#
# Schema per entry:
#   canonical: the function name (prefer widely-recognized terminology)
#   aliases: variant spellings / abbreviations
#   taxonomy_hint: one of {pathway, process, regulatory, cellular_component,
#                           gene_category, phenotype}
#   parent: optional parent category for hierarchy (e.g., "glycolysis" has
#           parent "central metabolism")
#
# This vocab is designed to grow via drift-candidate promotion. The seed
# aims for ~40-50 entries covering the categories we know BERIL projects
# investigate; real corpus analysis will surface the rest.

_meta:
  vocab_name: functions
  version: 1
  created: 2026-04-19
  entry_count: 42

