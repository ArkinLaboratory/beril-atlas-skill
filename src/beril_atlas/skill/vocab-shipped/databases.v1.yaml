# Databases vocabulary — v1
# Captures BERDL tables (with database + tenant) and external databases used by the corpus.
#
# Schema per entry:
#   canonical: display name (for BERDL: "<database>.<table>" notation)
#   aliases: variations
#   kind: berdl_table | external_db | berdl_tenant_namespace | tool_or_endpoint
#   database: parent BERDL database / namespace (for BERDL tables)
#   tenant: tenant ownership (for BERDL tables; default tenant if globally readable)
#   notes: provenance, access notes
#   source_evidence: where Phase 0 saw this
#
# Tenant info per BERDL governance memory: 4 RBAC roles, 3 namespace categories.
# Most kescience_* tables are public-readable; nmdc_arkin is a lab-specific BERDL tenant.

_meta:
  vocab_name: databases
  version: 1
  created: 2026-04-18
  entry_count: 38
  schema_note: "BERDL tables use canonical = <database>.<table> to capture DB+tenant metadata"

entries:

